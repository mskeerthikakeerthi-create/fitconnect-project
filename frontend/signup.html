<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up – Fitnexa</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    .auth-page{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:2rem;background:radial-gradient(ellipse at 70% 50%,rgba(255,107,53,0.07) 0%,transparent 60%),var(--bg);}
    .auth-card{width:100%;max-width:480px;}
    .auth-logo{text-align:center;margin-bottom:2rem;}
    .role-selector{display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:1.2rem;}
    .role-option{border:2px solid var(--border);border-radius:10px;padding:1rem;cursor:pointer;text-align:center;transition:var(--transition);}
    .role-option:hover{border-color:var(--primary);}
    .role-option.selected{border-color:var(--primary);background:rgba(0,200,150,0.08);}
    .role-option .role-icon{font-size:1.8rem;margin-bottom:0.4rem;}
    .role-option .role-name{font-weight:600;font-size:0.95rem;}
    .role-option .role-desc{font-size:0.78rem;color:var(--text-muted);margin-top:0.2rem;}
    .auth-switch{text-align:center;margin-top:1.5rem;font-size:0.9rem;color:var(--text-muted);}
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card card">
    <div class="auth-logo">
      <h1 style="font-size:2.2rem">FIT<span style="color:var(--primary)">NEXA</span></h1>
      <p style="color:var(--text-muted);font-size:0.9rem">Create your account – it's free 🚀</p>
    </div>

    <div id="alert-area"></div>

    <form id="signup-form">
      <!-- Role Selector -->
      <div class="form-group">
        <label class="form-label">I am a...</label>
        <div class="role-selector">
          <div class="role-option selected" data-role="USER" onclick="selectRole('USER', this)">
            <div class="role-icon">🏃</div>
            <div class="role-name">Client / User</div>
            <div class="role-desc">Find & book trainers</div>
          </div>
          <div class="role-option" data-role="TRAINER" onclick="selectRole('TRAINER', this)">
            <div class="role-icon">🏋️</div>
            <div class="role-name">Fitness Trainer</div>
            <div class="role-desc">Offer your services</div>
          </div>
        </div>
        <input type="hidden" id="role" value="USER">
      </div>

      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" id="name" class="form-control" placeholder="John Doe" required>
        <div class="form-error" id="name-error">Name is required</div>
      </div>

      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" id="email" class="form-control" placeholder="you@example.com" required>
        <div class="form-error" id="email-error">Enter a valid email</div>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Min 6 characters" required>
        <div class="form-error" id="password-error">Password must be at least 6 characters</div>
      </div>

      <div class="form-group">
        <label class="form-label">Location</label>
        <input type="text" id="location" class="form-control" placeholder="e.g., Mumbai, Delhi">
      </div>

      <div class="form-group" id="fitness-goal-group">
        <label class="form-label">Fitness Goal</label>
        <select id="fitnessGoal" class="form-control">
          <option value="">Select your goal</option>
          <option value="Weight Loss">Weight Loss</option>
          <option value="Muscle Gain">Muscle Gain</option>
          <option value="General Fitness">General Fitness</option>
          <option value="Flexibility">Flexibility & Yoga</option>
          <option value="Athletic Performance">Athletic Performance</option>
          <option value="Rehabilitation">Rehabilitation</option>
        </select>
      </div>

      <button type="submit" class="btn btn-primary btn-block btn-lg" id="signup-btn">
        Create Account
      </button>
    </form>

    <div class="auth-switch">
      Already have an account? <a href="login.html">Login →</a>
    </div>
  </div>
</div>

<script src="js/api.js"></script>
<script>
  if (Auth.isLoggedIn()) window.location.href = 'dashboard.html';

  function selectRole(role, el) {
    document.querySelectorAll('.role-option').forEach(r => r.classList.remove('selected'));
    el.classList.add('selected');
    document.getElementById('role').value = role;
    document.getElementById('fitness-goal-group').style.display = role === 'USER' ? 'block' : 'none';
  }

  function validate() {
    let valid = true;
    const fields = [
      { id: 'name', errId: 'name-error', check: v => v.trim().length >= 2, msg: 'Name is required' },
      { id: 'email', errId: 'email-error', check: v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v), msg: 'Valid email required' },
      { id: 'password', errId: 'password-error', check: v => v.length >= 6, msg: 'Min 6 characters' },
    ];
    fields.forEach(({ id, errId, check }) => {
      const val = document.getElementById(id).value;
      const err = document.getElementById(errId);
      if (!check(val)) { err.classList.add('show'); valid = false; }
      else err.classList.remove('show');
    });
    return valid;
  }

  document.getElementById('signup-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    if (!validate()) return;

    const btn = document.getElementById('signup-btn');
    btn.disabled = true;
    btn.textContent = 'Creating account...';

    try {
      const res = await AuthAPI.register({
        name: document.getElementById('name').value.trim(),
        email: document.getElementById('email').value.trim(),
        password: document.getElementById('password').value,
        role: document.getElementById('role').value,
        location: document.getElementById('location').value,
        fitnessGoal: document.getElementById('fitnessGoal').value,
      });

      const { token, userId, name, email, role } = res.data;
      Auth.setSession(token, { id: userId, name, email, role });

      showToast('Welcome to Fitnexa, ' + name + '! 🎉', 'success');
      setTimeout(() => window.location.href = 'dashboard.html', 1000);

    } catch (err) {
      document.getElementById('alert-area').innerHTML =
        `<div class="alert alert-error">❌ ${err.message}</div>`;
      btn.disabled = false;
      btn.textContent = 'Create Account';
    }
  });
</script>
</body>
</html>
