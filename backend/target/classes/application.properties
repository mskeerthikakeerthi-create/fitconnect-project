# ==========================================
# FitConnect - Application Properties
# ==========================================

# Server Configuration
server.port=8080

# ==========================================
# MySQL Database Configuration
# ==========================================
# Change these values to match your MySQL setup
spring.datasource.url=jdbc:mysql://localhost:3306/fitconnect_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=12345
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ==========================================
# JPA / Hibernate Configuration
# ==========================================
# update = auto-creates/updates tables on startup
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ==========================================
# JWT Configuration
# ==========================================
# IMPORTANT: Change this secret to a strong random string in production!
app.jwt.secret=FitConnectSecretKey2024VeryLongSecretKeyForJWTSigningPurposes
app.jwt.expiration=86400000

# ==========================================
# CORS Configuration
# ==========================================
app.cors.allowed-origins=http://localhost:3000,http://127.0.0.1:5500,http://localhost:5500

# ==========================================
# Logging
# ==========================================
logging.level.com.fitconnect=DEBUG
logging.level.org.springframework.security=INFO
